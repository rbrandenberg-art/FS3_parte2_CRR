# Configuración General
server.port=8081
spring.application.name=pedido-service

# Configuración de Base de Datos (H2 para pruebas o PostgreSQL/MySQL)
spring.datasource.url=jdbc:h2:mem:pedidodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Configuration Properties (Tus propiedades personalizadas)
# app.pedido.notificacion-enabled=true
# app.pedido.timeout-segundos=5

# Configuración de Feign y Eureka
spring.cloud.openfeign.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Logging para ver las trazas de comunicación
logging.level.org.springframework.web=INFO
logging.level.com.tuproyecto.pedido.client=DEBUG